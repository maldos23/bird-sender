<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>bird-sender</title>
  <script>
    (function() {
      var saved = localStorage.getItem('bird-theme');
      if (saved) { document.documentElement.setAttribute('data-theme', saved); return; }
      var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app">
    <header class="header" role="banner">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" class="logo-icon" aria-hidden="true">
          <circle cx="20" cy="20" r="20" class="logo-circle"/>
          <path d="M12 22C12 22 15 18 20 18C25 18 28 22 28 22" class="logo-line" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M10 20C10 20 14 14 20 14C26 14 30 20 30 20" class="logo-line" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="16" cy="20" r="1.5" class="logo-dot"/>
          <path d="M28 20L32 18" class="logo-line" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text" aria-label="bird-sender">bird-sender</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="toggle theme">
          <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <label for="nicknameInput" class="sr-only">your nickname</label>
        <input type="text" class="nickname-input" id="nicknameInput" placeholder="your nickname" maxlength="20" aria-label="your nickname">
        <div class="status" id="status" role="status" aria-live="polite">connecting...</div>
      </div>
    </header>

    <main class="main" id="mainContent">
      <button class="drop-zone" id="dropZone" aria-label="Drop files here or click to select">
        <div class="drop-content">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-icon" aria-hidden="true">
            <path d="M32 44V20M32 20L22 30M32 20L42 30" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="drop-text">drop files here</p>
          <p class="drop-subtext">or click to select</p>
        </div>
        <input type="file" id="fileInput" multiple hidden aria-hidden="true" tabindex="-1">
      </button>

      <section class="peers-section" id="peersSection" aria-label="devices on network">
        <h2 class="section-title">devices on network</h2>
        <div class="peers-list" id="peersList" role="list"></div>
      </section>

      <section class="transfers-section" id="transfersSection" aria-label="transfers">
        <h2 class="section-title">transfers</h2>
        <div class="transfers-list" id="transfersList" role="list"></div>
      </section>
    </main>

    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal" id="modal">
        <h3 class="modal-title" id="modalTitle">incoming transfer</h3>
        <p class="modal-text" id="modalText"></p>
        <div class="modal-files" id="modalFiles" role="list"></div>
        <div class="modal-actions">
          <button class="btn btn-accept" id="btnAccept">accept</button>
          <button class="btn btn-reject" id="btnReject">reject</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="passwordModalOverlay" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle">
      <div class="modal" id="passwordModal">
        <h3 class="modal-title" id="passwordModalTitle">password required</h3>
        <p class="modal-text" id="passwordModalText"></p>
        <div class="password-input-wrapper">
          <label for="passwordInput" class="sr-only">enter password</label>
          <input type="password" class="password-input" id="passwordInput" placeholder="enter password" aria-describedby="passwordError">
          <button class="password-toggle" id="passwordToggle" type="button" aria-label="show password" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="password-toggle-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="password-error" id="passwordError" role="alert"></p>
        <div class="modal-actions">
          <button class="btn btn-accept" id="btnPasswordAccept">unlock</button>
          <button class="btn btn-reject" id="btnPasswordReject">cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
